[project]
site_name = "crosstab"
site_author = "Caleb Grant"
site_description = "Rearrange data from a normalized CSV format to a crosstabulated format, with styling."
site_url = "https://crosstab.readthedocs.io/"
repo_url = "https://github.com/geocoug/crosstab"
repo_name = "geocoug/crosstab"
docs_dir = "docs"
copyright = "Copyright &copy; 2024-present Caleb Grant"
nav = [
    { "Home" = "index.md" },
    { "API Reference" = "crosstab.md" },
    { "Change Log" = "change_log.md" },
]

[project.plugins.mkdocstrings.handlers.python]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
members_order = "source"
separate_signature = true
merge_init_into_class = true
show_signature_annotations = true
signature_crossrefs = true
show_root_heading = true
show_source = true

[project.theme]
features = [
    "navigation.footer",
    "navigation.tabs",
    "navigation.sections",
    "navigation.path",
    "toc.follow",
    "search.highlight",
    "content.code.copy",
    "content.code.annotate",
]

# Palette toggle for light mode
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "blue grey"
accent = "blue grey"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

# Palette toggle for dark mode
[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "blue grey"
accent = "blue grey"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

# Markdown extensions
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
